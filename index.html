<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>Boss Timer</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <style>
    /* ====== CSS ====== */
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      padding: 20px;
    }

    h2 {
      color: #00ffd5;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 60px;
      height: 60px;
    }

    .controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    select,
    button {
      padding: 8px;
      margin: 4px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #00ffd5;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.8;
    }

    .card {
      display: flex;
      gap: 14px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 12px;
      padding: 12px;
      margin-top: 12px;
      border-left: 4px solid #00ffd5;
      transition: 0.3s;
    }

    .card.spawning {
      animation: pulse 1.5s infinite;
      border-left-color: #ff4d4d;
    }

    .img-box {
      display: flex;
      gap: 8px;
    }

    .boss-img,
    .map-img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
    }

    .boss-img {
      border: 2px solid #00ffd5;
    }

    .map-img {
      border: 2px solid #ffaa00;
    }

    .info b {
      color: #00ffd5;
    }

    .time {
      margin-top: 4px;
      color: #7CFF00;
    }

    .spawn-time {
      color: #ff4d4d;
      font-weight: bold;
    }

    .window {
      margin-top: 4px;
      font-weight: bold;
    }

    .CH1 { color: #00e5ff }
    .CH2 { color: #7CFF00 }
    .CH3 { color: #FFD700 }
    .CH4 { color: #FF9800 }
    .CH5 { color: #FF5252 }

    .delete {
      background: #ff4d4d;
      color: #fff;
      margin-top: 6px;
      cursor: pointer;
    }

    .reset {
      background: #ffaa00;
      color: #fff;
      margin-top: 6px;
      cursor: pointer;
    }

    .sound-btn {
      background: #9c27b0;
      color: #fff;
      padding: 10px 16px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
      cursor: pointer;
    }

    .sound-btn.muted {
      background: #666;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(255, 77, 77, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
    }
  </style>
</head>

<body>

  <h2>
    <img src="images/logo.png" class="logo" alt="Logo">
    ⏱ Boss Timer DARK HELL
  </h2>

  <div class="controls">
    <select id="map"></select>
    <select id="channel"></select>
    <select id="boss"></select>
    <button onclick="bossDead()">บอสตาย</button>
    <button id="soundToggle" class="sound-btn" onclick="toggleSound()">🔔 เสียงแจ้งเตือน</button>
  </div>

  <h3>รายการจับเวลา</h3>
  <div id="timers"></div>

  <script>
    /* ====== JS ====== */

    const NORMAL_RESPAWN = { min: 20, max: 30 };
    const SPECIAL_RESPAWN = { "จินโฮ": { min: 120, max: 180 } };

    const BOSS_IMAGES = {
      "หัวหน้าลามะชั่ว": "images/1.png",
      "โฮนโดนยักษ์": "images/2.png",
      "อสูรไร้หัว": "images/3.png",
      "ยอยอวา": "images/4.png",
      "ผีปังตอยักษ์": "images/5.png",
      "ต้นไม้ปีศาจหมื่นปี": "images/6.png",
      "ราชามาโบก": "images/7.png",
      "พญาเต่าจอมตะกล": "images/15.png",
      "ปีศาจแสงจันทร์": "images/17.png",
      "ยักษ์หินคึมกัง": "images/8.png",
      "ราชาอินโฮ": "images/9.png",
      "เบี้ยสีม่วง": "images/10.png",
      "หัวหน้าซานซีน": "images/11.png",
      "สมุนวานร": "images/12.png",
      "นักบวชมูโฮน": "images/13.png",
      "จอมเวทย์ซุลซา": "images/14.png",
      "พญาวัวอสูร": "images/16.png",
      "จินโฮ": "images/40.png"
    };

    const MAP_IMAGES = {
      "ทับอีชา": "images/map_tabicha.png",
      "วาชองจี": "images/map_wachongji.png",
      "สุสานจักรพรรดิ์": "images/map_tomb.png",
      "ชองจู": "images/map_cheongju.png",
      "แม่น้ำวังฮา": "images/map_river.png",
      "ทางเข้าถ้ำหินโยงมุน": "images/map_yongmun.png",
      "ทางเข้าถ้ำมักโก": "images/map_makgo.png",
      "ทะเลสาบโทซอง": "images/map_lake.png",
      "ถ้ำมักโกชั่นที่2": "images/map_makgo2.png",
      "บริเวณแม่น้ำวังฮา": "images/map_river2.png",
      "ภูเขาแทซานใต้": "images/map_taesan_s.png",
      "ภูเขาซุงซาน": "images/map_sungsan.png",
      "ยอดเขาแทซาน": "images/map_taesan_top.png",
      "ทางเหนือของภูเขาแทซาน": "images/map_taesan_n.png",
      "วัดเส้าหลิน": "images/map_shaolin.png",
      "กำแพงเมืองจีน": "images/map_wall.png",
      "โทนวัง": "images/map_tonwang.png",
      "ห้องจินโฮ": "images/map_jinho.png"
    };

    const BOSS_DATA = {
      "ทับอีชา": { "CH1": ["หัวหน้าลามะชั่ว"], "CH2": ["หัวหน้าลามะชั่ว"], "CH3": ["หัวหน้าลามะชั่ว"], "CH4": ["หัวหน้าลามะชั่ว"], "CH5": ["หัวหน้าลามะชั่ว"] },
      "วาชองจี": { "CH1": ["โฮนโดนยักษ์"], "CH2": ["โฮนโดนยักษ์"], "CH3": ["โฮนโดนยักษ์"], "CH4": ["โฮนโดนยักษ์"], "CH5": ["โฮนโดนยักษ์"] },
      "สุสานจักรพรรดิ์": { "CH1": ["อสูรไร้หัว"], "CH2": ["อสูรไร้หัว"], "CH3": ["อสูรไร้หัว"], "CH4": ["อสูรไร้หัว"], "CH5": ["อสูรไร้หัว"] },
      "ชองจู": { "CH1": ["ยอยอวา"], "CH2": ["ยอยอวา"], "CH3": ["ยอยอวา"], "CH4": ["ยอยอวา"], "CH5": ["ยอยอวา"] },
      "แม่น้ำวังฮา": { "CH1": ["ผีปังตอยักษ์"], "CH2": ["ผีปังตอยักษ์"], "CH3": ["ผีปังตอยักษ์"], "CH4": ["ผีปังตอยักษ์"], "CH5": ["ผีปังตอยักษ์"] },
      "ทางเข้าถ้ำหินโยงมุน": { "CH1": ["ต้นไม้ปีศาจหมื่นปี"], "CH2": ["ต้นไม้ปีศาจหมื่นปี"], "CH3": ["ต้นไม้ปีศาจหมื่นปี"], "CH4": ["ต้นไม้ปีศาจหมื่นปี"], "CH5": ["ต้นไม้ปีศาจหมื่นปี"] },
      "ทางเข้าถ้ำมักโก": { "CH1": ["ราชามาโบก"], "CH2": ["ราชามาโบก"], "CH3": ["ราชามาโบก"], "CH4": ["ราชามาโบก"], "CH5": ["ราชามาโบก"] },
      "ทะเลสาบโทซอง": { "CH1": ["พญาเต่าจอมตะกล"], "CH2": ["พญาเต่าจอมตะกล"], "CH3": ["พญาเต่าจอมตะกล"], "CH4": ["พญาเต่าจอมตะกล"], "CH5": ["พญาเต่าจอมตะกล"] },
      "ถ้ำมักโกชั่นที่2": { "CH1": ["ปีศาจแสงจันทร์"], "CH2": ["ปีศาจแสงจันทร์"], "CH3": ["ปีศาจแสงจันทร์"], "CH4": ["ปีศาจแสงจันทร์"], "CH5": ["ปีศาจแสงจันทร์"] },
      "บริเวณแม่น้ำวังฮา": { "CH1": ["ยักษ์หินคึมกัง"], "CH2": ["ยักษ์หินคึมกัง"], "CH3": ["ยักษ์หินคึมกัง"], "CH4": ["ยักษ์หินคึมกัง"], "CH5": ["ยักษ์หินคึมกัง"] },
      "ภูเขาแทซานใต้": { "CH1": ["ราชาอินโฮ"], "CH2": ["ราชาอินโฮ"], "CH3": ["ราชาอินโฮ"], "CH4": ["ราชาอินโฮ"], "CH5": ["ราชาอินโฮ"] },
      "ภูเขาซุงซาน": { "CH1": ["เบี้ยสีม่วง"], "CH2": ["เบี้ยสีม่วง"], "CH3": ["เบี้ยสีม่วง"], "CH4": ["เบี้ยสีม่วง"], "CH5": ["เบี้ยสีม่วง"] },
      "ยอดเขาแทซาน": { "CH1": ["หัวหน้าซานซีน"], "CH2": ["หัวหน้าซานซีน"], "CH3": ["หัวหน้าซานซีน"], "CH4": ["หัวหน้าซานซีน"], "CH5": ["หัวหน้าซานซีน"] },
      "ทางเหนือของภูเขาแทซาน": { "CH1": ["สมุนวานร"], "CH2": ["สมุนวานร"], "CH3": ["สมุนวานร"], "CH4": ["สมุนวานร"], "CH5": ["สมุนวานร"] },
      "วัดเส้าหลิน": { "CH1": ["นักบวชมูโฮน"], "CH2": ["นักบวชมูโฮน"], "CH3": ["นักบวชมูโฮน"], "CH4": ["นักบวชมูโฮน"], "CH5": ["นักบวชมูโฮน"] },
      "กำแพงเมืองจีน": { "CH1": ["จอมเวทย์ซุลซา"], "CH2": ["จอมเวทย์ซุลซา"], "CH3": ["จอมเวทย์ซุลซา"], "CH4": ["จอมเวทย์ซุลซา"], "CH5": ["จอมเวทย์ซุลซา"] },
      "โทนวัง": { "CH1": ["พญาวัวอสูร"], "CH2": ["พญาวัวอสูร"], "CH3": ["พญาวัวอสูร"], "CH4": ["พญาวัวอสูร"], "CH5": ["พญาวัวอสูร"] },
      "ห้องจินโฮ": { "CH1": ["จินโฮ"], "CH2": ["จินโฮ"], "CH3": ["จินโฮ"], "CH4": ["จินโฮ"], "CH5": ["จินโฮ"] }
    };

    const mapSel = document.getElementById("map");
    const chSel = document.getElementById("channel");
    const bossSel = document.getElementById("boss");
    const timersDiv = document.getElementById("timers");
    const soundToggleBtn = document.getElementById("soundToggle");

    let soundEnabled = localStorage.getItem("soundEnabled") !== "false";

    function updateSoundButton() {
      if (soundEnabled) {
        soundToggleBtn.innerHTML = "🔔 เสียงแจ้งเตือน";
        soundToggleBtn.classList.remove("muted");
      } else {
        soundToggleBtn.innerHTML = "🔕 ปิดเสียงแจ้งเตือน";
        soundToggleBtn.classList.add("muted");
      }
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      localStorage.setItem("soundEnabled", soundEnabled);
      updateSoundButton();
      if (soundEnabled) playNotificationSound();
    }

    function playNotificationSound() {
      if (!soundEnabled) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        for (let i = 0; i < 3; i++) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          osc.type = "sine";
          const start = now + i * 0.3;
          const end = start + 0.15;
          gain.gain.setValueAtTime(0, start);
          gain.gain.linearRampToValueAtTime(0.5, start + 0.02);
          gain.gain.linearRampToValueAtTime(0, end);
          osc.start(start);
          osc.stop(end + 0.1);
        }
      } catch (e) { console.log("Audio error:", e); }
    }

    function fmt(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      return h > 0
        ? `${h}:${String(m % 60).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`
        : `${String(m).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
    }

    function init() {
      for (let m in BOSS_DATA) mapSel.innerHTML += `<option>${m}</option>`;
      updateChannels();
      updateSoundButton();
      requestNotificationPermission();
      render();
    }

    function updateChannels() {
      chSel.innerHTML = "";
      for (let c in BOSS_DATA[mapSel.value]) chSel.innerHTML += `<option>${c}</option>`;
      updateBosses();
    }

    mapSel.onchange = updateChannels;

    function updateBosses() {
      bossSel.innerHTML = "";
      BOSS_DATA[mapSel.value][chSel.value].forEach(b => bossSel.innerHTML += `<option>${b}</option>`);
    }

    chSel.onchange = updateBosses;

    function requestNotificationPermission() {
      if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
    }

    function bossDead() {
      const key = `${mapSel.value}|${chSel.value}|${bossSel.value}`;
      const now = Date.now();
      const r = SPECIAL_RESPAWN[bossSel.value] || NORMAL_RESPAWN;
      localStorage.setItem(key, JSON.stringify({
        start: now,
        minTime: now + r.min * 60000,
        maxTime: now + r.max * 60000
      }));
      render();
    }

    function deleteTimer(k) {
      localStorage.removeItem(k);
      render();
    }

    function resetTimer(key) {
      const now = Date.now();
      const boss = key.split("|")[2];
      const r = SPECIAL_RESPAWN[boss] || NORMAL_RESPAWN;
      localStorage.setItem(key, JSON.stringify({
        start: now,
        minTime: now + r.min * 60000,
        maxTime: now + r.max * 60000
      }));
      render();
    }

    function render() {
      timersDiv.innerHTML = "";
      const now = Date.now();
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!k.includes("|")) continue;
        const data = JSON.parse(localStorage.getItem(k));
        const [map, ch, boss] = k.split("|");
        const minRem = data.minTime - now;
        const maxRem = data.maxTime - now;
        const isSpawning = minRem <= 0 && maxRem > 0;

        const card = document.createElement("div");
        card.className = "card" + (isSpawning ? " spawning" : "");

        card.innerHTML = `
        <div class="img-box">
          <img class="map-img" src="${MAP_IMAGES[map]}" alt="Map">
          <img class="boss-img" src="${BOSS_IMAGES[boss]}" alt="Boss">
        </div>
        <div class="info">
          <b>${boss}</b><br>
          Map: ${map}<br>
          Channel: <span class="${ch}">${ch}</span><br>
          <span class="time">เวลาเกิดขั้นต่ำ: ${minRem>0?fmt(minRem):'เกิดแล้ว'}<br>
          เวลาเกิดสูงสุด: ${maxRem>0?fmt(maxRem):'เกิดแล้ว'}</span><br>
          <button class="reset" onclick="resetTimer('${k}')">รีเซ็ตเวลา</button>
          <button class="delete" onclick="deleteTimer('${k}')">ลบ</button>
        </div>
        `;

        timersDiv.appendChild(card);

        if (isSpawning) {
          playNotificationSound();
          if ("Notification" in window && Notification.permission === "granted") {
            new Notification(`Boss ${boss} กำลังเกิด!`);
          }
        }
      }
    }

    setInterval(render, 1000);

    init();
  </script>

</body>
</html>
