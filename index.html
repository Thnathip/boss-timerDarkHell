// ================= UI =================
const mapSel=document.getElementById("map");
const chSel=document.getElementById("channel");
const bossSel=document.getElementById("boss");
const timersDiv=document.getElementById("timers");
let timersData={};

// ================= INIT =================
function init(){
  for(let m in BOSS_DATA) mapSel.innerHTML+=`<option>${m}</option>`;
  updateChannels();
  db.ref("bossTimers").on("value",snap=>{
    timersData=snap.val()||{};
    render();
  });
}

// ================= CHANNEL & BOSS =================
function updateChannels(){
  chSel.innerHTML="";
  for(let c in BOSS_DATA[mapSel.value]) chSel.innerHTML+=`<option>${c}</option>`;
  updateBosses();
}

function updateBosses(){
  bossSel.innerHTML="";
  BOSS_DATA[mapSel.value][chSel.value].forEach(b=>bossSel.innerHTML+=`<option>${b}</option>`);
}

mapSel.onchange=updateChannels;
chSel.onchange=updateBosses;

// ================= ACTION =================
function bossDead(){
  const key=`${mapSel.value}|${chSel.value}|${bossSel.value}`;
  const now=Date.now();
  const r=SPECIAL_RESPAWN[bossSel.value]||NORMAL_RESPAWN;
  db.ref("bossTimers/"+key).set({start:now,minTime:now+r.min*60000,maxTime:now+r.max*60000});
}

function resetTimer(key){
  const parts=key.split("|");
  const boss=parts[2];
  const r=SPECIAL_RESPAWN[boss]||NORMAL_RESPAWN;
  const now=Date.now();
  db.ref("bossTimers/"+key).set({start:now,minTime:now+r.min*60000,maxTime:now+r.max*60000});
}

function deleteTimer(key){
  db.ref("bossTimers/"+key).remove();
}

function fmt(ms){
  const s=Math.floor(ms/1000);
  const m=Math.floor(s/60);
  const h=Math.floor(m/60);
  return h>0
    ? `${h}:${String(m%60).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`
    : `${String(m).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
}

// ================= RENDER =================
function render(){
  timersDiv.innerHTML="";
  const now=Date.now();

  const sortedKeys = Object.keys(timersData).sort((a,b)=>{
    return timersData[b].start - timersData[a].start;
  });

  sortedKeys.forEach(k=>{
    const t=timersData[k];
    const [map,ch,boss]=k.split("|");
    let status="⏳ ยังไม่เกิด";
    if(now>=t.minTime&&now<=t.maxTime) status="✅ อยู่ในช่วงเกิด";
    if(now>t.maxTime) status="⛔ ครบเวลาแล้ว";

    timersDiv.innerHTML+=`
    <div class="card">
      <div class="img-box">
        <img src="${BOSS_IMAGES[boss]||''}" class="boss-img">
        <img src="${MAP_IMAGES[map]||''}" class="map-img">
      </div>
      <div class="info">
        <b>${map} | <span class="${ch}">${ch}</span> | ${boss}</b>
        <div class="time">⏱ เวลา: ${fmt(now-t.start)}</div>
        <div class="time spawn-time">🕒 ${new Date(t.minTime).toLocaleTimeString()} - ${new Date(t.maxTime).toLocaleTimeString()}</div>
        <div class="window">${status}</div>
        <button class="reset" onclick="resetTimer('${k}')">รีเซ็ตเวลา</button>
        <button class="delete" onclick="deleteTimer('${k}')">ลบ</button>
      </div>
    </div>`;
  });
}

setInterval(render,1000);
init();
